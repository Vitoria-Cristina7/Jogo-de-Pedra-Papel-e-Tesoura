<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Pedra, Papel e Tesoura</title>
</head>

<body>

  <header>
    <h1>Pedra, Papel e Tesoura</h1>
    <p>Desafie o computador. Escolha seu modo e jogue!</p>
  </header>

  <main class="container">
    <!-- MODO DE JOGO -->
    <section class="modo-jogo">

      <label for="modo">Modo de jogo:</label>

      <select id="modo">
        <option value="3">Melhor de 3</option>
        <option value="5">Melhor de 5</option>
      </select>
    
    </section>

    <!-- PLACAR -->
    <section class="placar">

      <div id="voce">
        <p>VOCÊ</p>
        <p id="pontosVoce">0</p>
      </div>

      <div id="empate">
        <p>EMPATES</p>
        <p id="pontosEmpate">0</p>
      </div>

      <div id="computador">
        <p>COMPUTADOR</p>
        <p id="pontosComputador">0</p>
      </div>

    </section>

    <!-- ESPAÇO DE BATALHA -->
    <section class="batalha">

      <div>
        <p>✊ ✋ ✌️</p>
        <p id="mensagem">Faça sua jogada para começar</p>
      </div>

    </section>

    <!-- BOTÕES DO JOGO -->
    <section class="botoes">

      <div>
        <button id="pedra">
          ✊ Pedra
        </button>

        <button id="papel">
          ✋ Papel
        </button>

        <button id="tesoura">
          ✌️ Tesoura
        </button>
      </div>

    </section>

    <!-- HISTÓRICO -->
    <section class="historico">

      <div>
        <p>Últimas 10 rodadas</p>
        <button type="button" id="zerar">Zerar placar</button>
        <div id="listaHistorico">
          <p>Nenhuma rodada ainda.</p>
        </div>
      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
